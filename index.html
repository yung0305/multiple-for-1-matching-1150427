<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配對遊戲</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Zen Maru Gothic', sans-serif; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes wrong-shake {
      0%, 100% { transform: translateX(0) rotate(0deg) scale(1); }
      25% { transform: translateX(-15px) rotate(-15deg) scale(1.1); }
      50% { transform: translateX(15px) rotate(15deg) scale(1.1); }
      75% { transform: translateX(-15px) rotate(-15deg) scale(1.1); }
    }

    @keyframes pulse-soft {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .float-animation { animation: float 3s ease-in-out infinite; }
    .bounce-in { animation: bounce-in 0.5s ease-out forwards; }
    .wrong-shake { animation: wrong-shake 0.6s ease-in-out forwards; }
    .pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }
    
    .sparkle::before, .sparkle::after {
      content: '✨';
      position: absolute;
      animation: sparkle 1.5s ease-in-out infinite;
    }
    .sparkle::before { top: -10px; left: -10px; animation-delay: 0s; }
    .sparkle::after { bottom: -10px; right: -10px; animation-delay: 0.75s; }
    
    .option-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .option-card:hover:not(:disabled) {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px rgba(255, 182, 193, 0.4);
    }
    .option-card:active:not(:disabled) {
      transform: scale(0.98);
    }
    
    .kawaii-bg {
      background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 50%, #fff0f5 100%);
    }
    
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
    }
    
    .admin-panel {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
    }
  </style>
 </head>
 <body class="h-full kawaii-bg overflow-auto">
  <div id="app" class="w-full h-full relative">
   <!-- 裝飾背景雲朵 -->
   <div class="cloud w-20 h-12" style="top: 5%; left: 10%;"></div>
   <div class="cloud w-16 h-10" style="top: 15%; right: 15%;"></div>
   <div class="cloud w-24 h-14" style="top: 8%; right: 30%;"></div>
   
   <div id="game-view" class="w-full h-full flex flex-col items-center justify-center p-4 relative">
    <div class="text-center mb-6">
     <h1 id="main-title" class="text-3xl md:text-4xl font-bold text-pink-600 float-animation relative sparkle">🌸 配對遊戲 🌸</h1>
     <div id="score-display" class="mt-2 text-lg text-pink-500 font-bold">
      得分: <span id="score">0</span> / <span id="total">0</span>
     </div>
    </div>
    
    <div id="question-area" class="w-full max-w-4xl">
     <!-- 題目顯示區塊 -->
     <div id="question-card" class="bg-white rounded-3xl p-6 shadow-lg border-4 border-pink-200 mb-6 max-w-2xl mx-auto flex flex-col items-center justify-center min-h-[120px]">
      <p id="question-text" class="text-xl md:text-2xl text-center text-gray-700 font-medium whitespace-pre-line">點擊下方開始遊戲！</p>
     </div>
     
     <!-- 選項顯示區塊 -->
     <div id="options-container" class="grid gap-4 md:gap-6">
     </div>
    </div>
    
    <!-- 答題回饋訊息 -->
    <div id="result-message" class="mt-6 text-2xl font-bold hidden h-10 flex items-center justify-center"></div>
    
    <!-- 遊戲控制按鈕 -->
    <div class="mt-6 flex gap-4 flex-wrap justify-center">
     <button id="start-btn" onclick="startGame()" class="px-6 py-3 bg-gradient-to-r from-pink-400 to-pink-500 text-white rounded-full font-bold shadow-lg hover:from-pink-500 hover:to-pink-600 transition-all hover:scale-105"> 🎮 開始遊戲 </button> 
     <button id="restart-btn" onclick="resetToMenu()" class="px-6 py-3 bg-gradient-to-r from-orange-400 to-orange-500 text-white rounded-full font-bold shadow-lg hover:from-orange-500 hover:to-orange-600 transition-all hover:scale-105 hidden"> 🔄 重新開始 </button> 
     <button id="next-btn" onclick="nextQuestion()" class="px-8 py-3 bg-gradient-to-r from-purple-400 to-purple-500 text-white rounded-full font-bold shadow-lg hover:from-purple-500 hover:to-purple-600 transition-all hover:scale-105 pulse-soft hidden"> ➡️ 下一題 </button> 
     <button onclick="openAdmin()" class="px-6 py-3 bg-gradient-to-r from-gray-400 to-gray-500 text-white rounded-full font-bold shadow-lg hover:from-gray-500 hover:to-gray-600 transition-all hover:scale-105"> ⚙️ 管理後台 </button>
    </div>
   </div>
   
   <!-- 管理後台面板 -->
   <div id="admin-panel" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black bg-opacity-30" onclick="closeAdmin()"></div>
    <div class="admin-panel absolute right-0 top-0 h-full w-full max-w-lg overflow-y-auto shadow-2xl border-l-4 border-pink-300 flex flex-col">
     <div class="p-6 flex-grow">
      <div class="flex items-center justify-between mb-6">
       <h2 class="text-2xl font-bold text-pink-600">🎀 管理後台</h2>
       <button onclick="closeAdmin()" class="text-3xl text-gray-400 hover:text-gray-600 transition-colors">×</button>
      </div>

      <div class="bg-white rounded-2xl p-4 mb-6 border-2 border-pink-200 shadow-sm">
       <h3 class="font-bold text-pink-600 mb-3">⚙️ 遊戲基本設定</h3>
       <div class="space-y-3">
        <div>
         <label class="block text-sm font-medium text-gray-600 mb-1">遊戲顯示名稱</label>
         <input type="text" id="setting-title" placeholder="例如：🌸 認識水果遊戲 🌸" class="w-full px-3 py-2 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none text-sm transition-colors">
        </div>
        <div>
         <label class="block text-sm font-medium text-gray-600 mb-1">選項數量設定</label>
         <select id="setting-options-count" class="w-full px-3 py-2 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none text-sm transition-colors">
          <option value="2">二選一 (2個選項)</option>
          <option value="3">三選一 (3個選項)</option>
          <option value="4">四選一 (4個選項)</option>
         </select>
        </div>
        <div>
         <label class="block text-sm font-medium text-gray-600 mb-1">語音朗讀功能 (TTS)</label>
         <select id="setting-enable-tts" class="w-full px-3 py-2 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none text-sm transition-colors">
          <option value="true">開啟 (自動與點擊朗讀題目)</option>
          <option value="false">關閉</option>
         </select>
        </div>
       </div>
      </div>

      <div class="bg-white rounded-2xl p-4 mb-6 border-2 border-pink-200 shadow-sm">
       <h3 class="font-bold text-pink-600 mb-3">📦 資料備份與還原</h3>
       
       <!-- 雲端匯入區塊 -->
       <div class="flex items-center bg-pink-50 rounded-lg p-2 border border-pink-200 mb-3">
           <select id="cloudImportSelect" class="bg-transparent text-gray-700 font-bold px-2 py-1 outline-none text-sm cursor-pointer flex-grow border-r border-pink-200 mr-2">
               <option value="" disabled selected class="text-gray-400">選擇雲端資料庫...</option>
           </select>
           <button id="cloudImportBtn" class="flex items-center gap-1 px-3 py-1 bg-pink-500 text-white rounded-md hover:bg-pink-600 font-bold transition-all text-sm shrink-0 shadow-sm">
               ☁️ 雲端匯入
           </button>
       </div>
       
       <div class="flex gap-3">
         <button onclick="exportJson()" class="flex-1 py-2 bg-gradient-to-r from-blue-400 to-blue-500 text-white rounded-lg font-bold hover:from-blue-500 hover:to-blue-600 transition-all shadow text-sm"> 📥 下載資料 (.json) </button>
         <button onclick="document.getElementById('import-file').click()" class="flex-1 py-2 bg-gradient-to-r from-purple-400 to-purple-500 text-white rounded-lg font-bold hover:from-purple-500 hover:to-purple-600 transition-all shadow text-sm"> 📤 本機匯入 (.json) </button>
         <input type="file" id="import-file" accept=".json" class="hidden" onchange="importJson(event)">
       </div>
       <p class="text-xs text-gray-500 mt-2 text-center">※ 匯入資料後，請務必點擊最下方的「儲存設定」才會生效喔！</p>
      </div>

      <div class="bg-white rounded-2xl p-4 mb-6 border-2 border-pink-200 shadow-sm">
       <h3 class="font-bold text-pink-600 mb-3">➕ 新增配對項目</h3>
       <form id="add-form" onsubmit="addPairItem(event)" class="space-y-3">
        <div><label class="block text-sm font-medium text-gray-600 mb-1">標籤文字 (語音會唸出此文字)</label> <input type="text" id="new-label" placeholder="例：花" required class="w-full px-3 py-2 border-2 border-pink-200 rounded-lg focus:border-pink-400 focus:outline-none transition-colors">
        </div>
        <div><label class="block text-sm font-medium text-gray-600 mb-1">配對圖片（JPG/PNG）</label> <input type="file" id="new-image" accept=".jpg,.jpeg,.png" onchange="previewImage(event, 'preview-img')" required class="w-full px-3 py-2 border-2 border-pink-200 rounded-lg text-sm transition-colors">
         <div id="preview-img" class="mt-2 max-w-20 max-h-20"></div>
        </div>
        <button type="submit" id="add-btn" class="w-full py-2 bg-gradient-to-r from-pink-400 to-pink-500 text-white rounded-lg font-bold hover:from-pink-500 hover:to-pink-600 transition-all"> ✨ 暫存項目 </button>
       </form>
      </div>

      <div class="bg-white rounded-2xl p-4 border-2 border-pink-200 shadow-sm">
       <div class="flex justify-between items-center mb-3">
         <h3 class="font-bold text-pink-600">📋 待儲存項目 (<span id="item-count">0</span>項)</h3>
         <button onclick="clearTempItems()" class="text-xs px-2 py-1 bg-gray-200 text-gray-600 rounded hover:bg-gray-300 transition-colors font-medium">清空項目</button>
       </div>
       <div id="item-list" class="space-y-3 max-h-80 overflow-y-auto p-1">
        <p class="text-gray-400 text-center py-4">目前沒有項目，請新增項目開始！</p>
       </div>
      </div>
     </div>

     <div class="p-6 bg-white border-t-2 border-pink-200">
      <button onclick="saveAdmin()" class="w-full py-4 bg-gradient-to-r from-green-400 to-green-500 text-white rounded-xl font-bold text-lg shadow-lg hover:from-green-500 hover:to-green-600 transition-all hover:scale-105"> 💾 儲存設定 </button>
      <p class="text-xs text-center text-gray-500 mt-2">※ 點擊儲存後，剛才新增、刪除或匯入的項目才會生效！</p>
     </div>
    </div>
   </div>
   
   <!-- 提示訊息 -->
   <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg text-white font-medium transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50"></div>
  </div>
  
  <script>
    // --- 1. 資料初始化與設定 ---
    const PRESET_CLOUD_CONFIGS = [
        { filename: 'APP圖檔.json', label: '📦 APP圖檔預設資料庫' }
    ];

    let pairItems = JSON.parse(localStorage.getItem('pairItems')) || [];
    let tempPairItems = []; 
    
    let gameSettings = JSON.parse(localStorage.getItem('gameSettings')) || {
      title: "🌸 2選1配對遊戲 🌸",
      optionCount: 2,
      enableTTS: true
    };
    
    if (gameSettings.enableTTS === undefined) gameSettings.enableTTS = true;
    
    let tempGameSettings = { ...gameSettings };

    let generatedQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let gameStarted = false;
    let deleteConfirmId = null;

    // 音效設定
    const correctSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3'); 
    const wrongSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3');

    // 獨立播放音效函式 (解決快速點擊時音效卡住的問題)
    function playAudio(audioObj) {
      const clone = audioObj.cloneNode();
      clone.volume = 0.5;
      clone.play().catch(e => console.log('Audio play failed:', e));
    }

    const optionStyles = [
        "from-pink-100 to-pink-200 border-pink-300 hover:border-pink-400",
        "from-blue-100 to-blue-200 border-blue-300 hover:border-blue-400",
        "from-green-100 to-green-200 border-green-300 hover:border-green-400",
        "from-purple-100 to-purple-200 border-purple-300 hover:border-purple-400"
    ];

    // --- 2. 語音朗讀 (TTS) 功能 ---
    function speakText(text) {
      if (!gameSettings.enableTTS) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW'; 
        utterance.rate = 0.85;    
        window.speechSynthesis.speak(utterance);
      }
    }

    function speakCurrentQuestion() {
      if (!gameStarted) return;
      const q = generatedQuestions[currentQuestionIndex];
      if (q && q.label) speakText(q.label);
    }

    // --- 3. 儲存機制保護 (防爆容量) ---
    function saveToLocalStorage(key, value) {
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (e) {
        console.error("Storage Error:", e);
        if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
          showToast('❌ 儲存空間已滿！請先刪除一些舊項目再儲存。', 'error');
        } else {
          showToast('❌ 儲存失敗，請確認瀏覽器狀態。', 'error');
        }
        return false;
      }
    }

    // --- 4. 系統操作邏輯 ---
    function initCloudOptions() {
        const select = document.getElementById('cloudImportSelect');
        PRESET_CLOUD_CONFIGS.forEach(config => {
            const option = document.createElement('option');
            option.value = config.filename;
            option.textContent = config.label;
            option.className = 'text-gray-800';
            select.appendChild(option);
        });

        document.getElementById('cloudImportBtn').addEventListener('click', async () => {
            const filename = document.getElementById('cloudImportSelect').value;
            if (!filename) {
                showToast('請先選擇要匯入的雲端資料庫！', 'error');
                return;
            }
            
            const btn = document.getElementById('cloudImportBtn');
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = '⏳ 讀取中...';
                btn.disabled = true;
                
                const response = await fetch(filename);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    const existingIds = new Set(tempPairItems.map(item => item.__backendId));
                    let importCount = 0;
                    data.forEach(item => {
                        if (!existingIds.has(item.__backendId)) {
                            tempPairItems.push(item);
                            importCount++;
                        }
                    });
                    renderItemList();
                    showToast(`成功匯入 ${importCount} 筆資料！請記得點擊「儲存設定」！`, 'success');
                } else {
                    throw new Error("格式錯誤：需要陣列格式");
                }
            } catch (err) {
                showToast(`無法讀取檔案。請確認檔案是否存在。`, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    }

    function init() {
      document.getElementById('main-title').textContent = gameSettings.title;
      document.title = gameSettings.title; 
      initCloudOptions();
      resetToMenu(); 
    }

    function openAdmin() {
      tempPairItems = JSON.parse(JSON.stringify(pairItems));
      tempGameSettings = { ...gameSettings };
      
      document.getElementById('setting-title').value = tempGameSettings.title;
      document.getElementById('setting-options-count').value = tempGameSettings.optionCount;
      document.getElementById('setting-enable-tts').value = tempGameSettings.enableTTS !== false ? "true" : "false";
      
      renderItemList();
      document.getElementById('admin-panel').classList.remove('hidden');
    }

    function closeAdmin() {
      document.getElementById('admin-panel').classList.add('hidden');
      deleteConfirmId = null;
    }

    function saveAdmin() {
      const newItemsStr = JSON.stringify(tempPairItems);
      const newSettingsStr = JSON.stringify({
        title: document.getElementById('setting-title').value || "🌸 配對遊戲 🌸",
        optionCount: parseInt(document.getElementById('setting-options-count').value) || 2,
        enableTTS: document.getElementById('setting-enable-tts').value === "true"
      });

      // 防爆容量檢查機制
      if (saveToLocalStorage('pairItems', newItemsStr) && saveToLocalStorage('gameSettings', newSettingsStr)) {
        pairItems = JSON.parse(newItemsStr);
        gameSettings = JSON.parse(newSettingsStr);
        init();
        closeAdmin();
        showToast('設定已成功儲存！💾');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `fixed bottom-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg text-white font-medium transition-all duration-300 z-50 ${
        type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
      }`;
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(0)';
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(1rem)';
      }, 2500);
    }

    function exportJson() {
      if (tempPairItems.length === 0) {
        showToast('目前沒有資料可以下載喔！', 'error');
        return;
      }
      const dataStr = JSON.stringify(tempPairItems, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      
      const date = new Date();
      const dateString = `${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}`;
      a.download = `pair_game_data_${dateString}.json`;
      
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showToast('資料已成功下載！📥');
    }

    function importJson(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedData = JSON.parse(e.target.result);
          if (Array.isArray(importedData)) {
            const existingIds = new Set(tempPairItems.map(item => item.__backendId));
            importedData.forEach(item => {
                if (!existingIds.has(item.__backendId)) tempPairItems.push(item);
            });
            renderItemList();
            showToast('資料讀取成功！請記得點擊「儲存設定」！', 'success');
          } else {
            showToast('匯入失敗：檔案格式不正確', 'error');
          }
        } catch (err) {
          showToast('匯入失敗：無法解析 JSON 檔案', 'error');
        }
        event.target.value = '';
      };
      reader.readAsText(file);
    }

    // 最佳化圖片壓縮：降低畫素與畫質以節省本地端容量 (300x300, 70% quality)
    async function compressImage(file, maxWidth = 300, maxHeight = 300, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          
          img.onload = () => {
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round((width * maxHeight) / height);
                height = maxHeight;
              }
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);

            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    }

    async function addPairItem(event) {
      event.preventDefault();
      
      if (tempPairItems.length >= 999) {
        showToast('已達到項目上限（999項）', 'error');
        return;
      }
      
      const addBtn = document.getElementById('add-btn');
      addBtn.disabled = true;
      addBtn.textContent = '處理中...';
      
      const imageFile = document.getElementById('new-image').files[0];
      
      if (!imageFile) {
        showToast('請選擇圖片', 'error');
        addBtn.disabled = false;
        addBtn.textContent = '✨ 暫存項目';
        return;
      }

      try {
        const imageBase64 = await compressImage(imageFile);
        
        const newItem = {
          __backendId: Date.now().toString(),
          type: 'pair_item',
          label: document.getElementById('new-label').value,
          image: imageBase64,
          created_at: new Date().toISOString()
        };

        tempPairItems.push(newItem);
        renderItemList();
        
        addBtn.disabled = false;
        addBtn.textContent = '✨ 暫存項目';
        
        document.getElementById('add-form').reset();
        document.getElementById('preview-img').innerHTML = '';
        showToast('項目已暫存，請記得點擊下方「儲存設定」！');
        
      } catch (error) {
        addBtn.disabled = false;
        addBtn.textContent = '✨ 暫存項目';
        showToast('圖片轉換失敗，請再試一次', 'error');
      }
    }

    function deletePairItem(backendId) {
      if (deleteConfirmId !== backendId) {
        deleteConfirmId = backendId;
        renderItemList();
        return;
      }
      tempPairItems = tempPairItems.filter(i => i.__backendId !== backendId);
      renderItemList();
      deleteConfirmId = null;
      showToast('項目已從暫存中移除');
    }

    function clearTempItems() {
        if (confirm("確定要清空所有待儲存的項目嗎？（這不會影響已儲存的資料，除非您按下儲存設定）")) {
            tempPairItems = [];
            renderItemList();
            showToast('已清空暫存項目');
        }
    }

    function cancelDelete() {
      deleteConfirmId = null;
      renderItemList();
    }

    function renderItemList() {
      const container = document.getElementById('item-list');
      document.getElementById('item-count').textContent = tempPairItems.length;
      
      if (tempPairItems.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-center py-4">目前沒有項目，請新增項目開始！</p>';
        return;
      }
      
      container.innerHTML = tempPairItems.map((item, index) => {
        const isConfirming = deleteConfirmId === item.__backendId;
        return `
          <div class="bg-pink-50 rounded-xl p-3 border border-pink-200">
            <div class="flex justify-between items-start mb-2">
              <span class="text-pink-600 font-bold">#${index + 1}</span>
              ${isConfirming ? `
                <div class="flex gap-1">
                  <button onclick="deletePairItem('${item.__backendId}')" class="px-2 py-1 bg-red-500 text-white text-xs rounded hover:bg-red-600 shadow transition-colors">確定刪除</button>
                  <button onclick="cancelDelete()" class="px-2 py-1 bg-gray-400 text-white text-xs rounded hover:bg-gray-500 shadow transition-colors">取消</button>
                </div>
              ` : `
                <button onclick="deletePairItem('${item.__backendId}')" class="text-red-400 hover:text-red-600 text-sm font-bold transition-colors">🗑️ 刪除</button>
              `}
            </div>
            <div class="flex gap-2 items-center">
              <img src="${item.image}" class="w-12 h-12 object-cover rounded shadow-sm">
              <span class="text-gray-700 font-medium">${escapeHtml(item.label || '無標籤')}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function previewImage(event, previewId) {
      const file = event.target.files[0];
      const previewDiv = document.getElementById(previewId);
      
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          previewDiv.innerHTML = `<img src="${e.target.result}" class="h-20 w-20 object-cover rounded shadow-sm">`;
        };
        reader.readAsDataURL(file);
      } else {
        previewDiv.innerHTML = '';
      }
    }

    // --- 5. 遊戲進行邏輯 ---
    function generateQuestions() {
      generatedQuestions = [];
      const optsCount = gameSettings.optionCount;
      if (pairItems.length < optsCount) return;

      pairItems.forEach((correctItem, correctIndex) => {
        let optionsArray = [correctItem];
        let availableWrongIndices = pairItems.map((_, i) => i).filter(i => i !== correctIndex);
        availableWrongIndices.sort(() => Math.random() - 0.5);
        
        for(let i = 0; i < optsCount - 1; i++) {
          optionsArray.push(pairItems[availableWrongIndices[i]]);
        }
        
        let shuffledOptions = optionsArray.map(value => ({ value, sort: Math.random() }))
                                          .sort((a, b) => a.sort - b.sort)
                                          .map(({ value }) => value);
        
        let correctAnsIndex = shuffledOptions.findIndex(item => item.__backendId === correctItem.__backendId);

        generatedQuestions.push({
          label: correctItem.label,
          options: shuffledOptions,
          correctAnswerIndex: correctAnsIndex
        });
      });
    }

    function getGridClass(count) {
      if (count === 2) return 'grid-cols-2 max-w-2xl mx-auto';
      if (count === 3) return 'grid-cols-2 md:grid-cols-3 max-w-4xl mx-auto';
      if (count === 4) return 'grid-cols-2 md:grid-cols-4 max-w-4xl mx-auto';
      return 'grid-cols-2';
    }

    function renderOptionsUI(mode = 'menu', questionData = null) {
      const container = document.getElementById('options-container');
      const count = gameSettings.optionCount;
      container.className = `grid gap-4 md:gap-6 ${getGridClass(count)}`;
      container.innerHTML = '';
      
      const emojis = ['🌸', '🌼', '🍀', '🌟'];

      for (let i = 0; i < count; i++) {
        const btn = document.createElement('button');
        btn.id = `option-${i}`;
        
        // 加上 relative 以便精準定位 X
        btn.className = `option-card relative bg-gradient-to-br rounded-2xl p-4 border-4 shadow-md flex flex-col items-center justify-center min-h-32 md:min-h-48 ${optionStyles[i % optionStyles.length]}`;
        
        if (mode === 'menu') {
          btn.innerHTML = `<span class="text-5xl">${emojis[i % emojis.length]}</span>`;
          btn.disabled = true;
          btn.classList.remove('hover:scale-102'); 
        } else if (mode === 'game' && questionData) {
          btn.innerHTML = `<img src="${questionData.options[i].image}" class="w-full h-32 md:h-48 object-contain rounded-lg drop-shadow-sm pointer-events-none">`;
          btn.onclick = () => selectOption(i);
        }
        
        container.appendChild(btn);
      }
    }

    function resetToMenu() {
      gameStarted = false;
      document.getElementById('score').textContent = '0';
      document.getElementById('total').textContent = pairItems.length;
      
      document.getElementById('question-card').innerHTML = `<p id="question-text" class="text-xl md:text-2xl text-center text-gray-700 font-medium">點擊下方開始遊戲！</p>`;
      
      renderOptionsUI('menu');
      
      document.getElementById('start-btn').classList.remove('hidden');
      document.getElementById('restart-btn').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');
      document.getElementById('result-message').classList.add('hidden');
    }

    function startGame() {
      const neededItems = gameSettings.optionCount;
      if (pairItems.length < neededItems) {
        showToast(`請先去「管理後台」至少新增或匯入 ${neededItems} 個配對項目！`, 'error');
        return;
      }
      
      generateQuestions();
      generatedQuestions = generatedQuestions.sort(() => Math.random() - 0.5);
      currentQuestionIndex = 0;
      score = 0;
      gameStarted = true;
      
      document.getElementById('score').textContent = '0';
      document.getElementById('total').textContent = generatedQuestions.length;
      document.getElementById('start-btn').classList.add('hidden');
      document.getElementById('restart-btn').classList.remove('hidden');
      document.getElementById('result-message').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');
      
      showQuestion();
    }

    function showQuestion() {
      const q = generatedQuestions[currentQuestionIndex];
      const questionCard = document.getElementById('question-card');
      
      questionCard.classList.remove('bounce-in');
      void questionCard.offsetWidth;
      questionCard.classList.add('bounce-in');
      
      // 點擊文字即觸發發音，並提供視覺互動提示
      questionCard.innerHTML = `
        <div class="flex flex-col items-center justify-center gap-3 w-full h-full cursor-pointer hover:bg-pink-50 rounded-2xl transition-colors" onclick="speakCurrentQuestion()">
          <p id="question-text" class="text-3xl md:text-5xl text-center text-pink-600 font-bold drop-shadow-sm select-none">${escapeHtml(q.label)}</p>
        </div>
      `;
      
      renderOptionsUI('game', q);
      
      document.getElementById('next-btn').classList.add('hidden');
      document.getElementById('result-message').classList.add('hidden');
      
      // 如果設定開啟，顯示題目時自動朗讀
      if (gameSettings.enableTTS) speakCurrentQuestion();
    }

    function selectOption(selectedIndex) {
      if (!gameStarted) return;
      
      const q = generatedQuestions[currentQuestionIndex];
      const resultMessage = document.getElementById('result-message');
      const isCorrect = (selectedIndex === q.correctAnswerIndex);
      
      // 鎖定所有選項並更新顏色反饋
      for(let i = 0; i < gameSettings.optionCount; i++) {
        const btn = document.getElementById(`option-${i}`);
        btn.disabled = true;
        btn.classList.remove('hover:border-pink-400', 'hover:border-blue-400', 'hover:border-green-400', 'hover:border-purple-400');
        
        if (i === q.correctAnswerIndex) {
          btn.classList.add('ring-4', 'ring-green-400', 'bg-green-100');
        } else if (i === selectedIndex && !isCorrect) {
          btn.classList.add('ring-4', 'ring-red-400', 'bg-red-100');
        }
      }
      
      if (isCorrect) {
        score++;
        document.getElementById('score').textContent = score;
        
        playAudio(correctSound);
        
        resultMessage.textContent = '答對了~很棒';
        resultMessage.className = 'mt-6 text-2xl font-bold text-green-500 bounce-in h-10 flex items-center justify-center';
      } else {
        playAudio(wrongSound);
        
        resultMessage.textContent = '答錯了~好可惜!';
        resultMessage.className = 'mt-6 text-2xl font-bold text-red-500 wrong-shake h-10 flex items-center justify-center';
        
        // 將 X 標記準確疊加在錯誤按鈕之上
        const xMark = document.createElement('div');
        xMark.textContent = '✕';
        xMark.className = 'absolute inset-0 flex items-center justify-center text-8xl md:text-9xl font-bold text-red-500 pointer-events-none wrong-shake z-50 drop-shadow-lg';
        
        const selectedBtn = document.getElementById(`option-${selectedIndex}`);
        selectedBtn.appendChild(xMark);
        setTimeout(() => xMark.remove(), 600);
      }
      
      resultMessage.classList.remove('hidden');
      
      const nextBtn = document.getElementById('next-btn');
      nextBtn.classList.remove('hidden');
      
      if (currentQuestionIndex < generatedQuestions.length - 1) {
        nextBtn.textContent = '➡️ 下一題';
        nextBtn.onclick = nextQuestion;
      } else {
        nextBtn.textContent = '🏆 查看結果';
        nextBtn.onclick = endGame;
      }
    }

    function nextQuestion() {
      currentQuestionIndex++;
      showQuestion();
    }

    function endGame() {
      gameStarted = false;
      
      const percentage = Math.round((score / generatedQuestions.length) * 100);
      let message = '';
      
      if (percentage === 100) {
        message = '🎊 完美！全部答對！你太厲害了！🌟';
        playAudio(correctSound);
      } else if (percentage >= 80) {
        message = '🎉 太棒了！表現得很好！';
        playAudio(correctSound);
      } else if (percentage >= 60) {
        message = '😊 不錯喔！繼續加油！';
      } else {
        message = '💪 沒關係，再試一次吧！';
      }
      
      document.getElementById('question-card').innerHTML = `<p id="question-text" class="text-xl md:text-2xl text-center text-gray-700 font-bold whitespace-pre-line">遊戲結束！\n得分：${score}/${generatedQuestions.length} (${percentage}%)\n${message}</p>`;
      speakText(`遊戲結束！你的得分是 ${score}分。`);

      // 結束畫面顯示 2 個按鈕 (再玩一次 / 管理後台)
      const container = document.getElementById('options-container');
      container.className = `grid gap-4 md:gap-6 grid-cols-2 max-w-2xl mx-auto`;
      container.innerHTML = '';
      
      const btnRestart = document.createElement('button');
      btnRestart.className = `option-card bg-gradient-to-br rounded-2xl p-4 border-4 shadow-md flex flex-col items-center justify-center min-h-32 md:min-h-48 ${optionStyles[0]}`;
      btnRestart.innerHTML = '<span class="text-5xl">🔄</span><span class="mt-4 font-bold text-xl text-gray-700">再玩一次</span>';
      btnRestart.onclick = startGame;

      const btnAdmin = document.createElement('button');
      btnAdmin.className = `option-card bg-gradient-to-br rounded-2xl p-4 border-4 shadow-md flex flex-col items-center justify-center min-h-32 md:min-h-48 ${optionStyles[1]}`;
      btnAdmin.innerHTML = '<span class="text-5xl">⚙️</span><span class="mt-4 font-bold text-xl text-gray-700">管理後台</span>';
      btnAdmin.onclick = openAdmin;

      container.appendChild(btnRestart);
      container.appendChild(btnAdmin);
      
      document.getElementById('next-btn').classList.add('hidden');
      document.getElementById('restart-btn').classList.add('hidden');
      document.getElementById('result-message').classList.add('hidden');
    }

    // 初始化啟動
    init();
  </script>
 </body>
